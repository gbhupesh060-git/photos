<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhupesh Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body{background:#0f172a;color:white;}

nav{
position:sticky;top:0;display:flex;justify-content:space-between;
padding:15px 30px;background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
}
nav h2{color:#00f2fe;}
nav ul{display:flex;list-style:none;}
nav ul li{margin:0 15px;cursor:pointer;}
nav ul li:hover{color:#00f2fe;}

section{padding:70px 20px;text-align:center;}

.banner{
background:linear-gradient(135deg,#00f2fe,#4facfe);
padding:80px 20px;
}
.banner h1{font-size:40px;animation:fade 2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* PROFILE */
.profile-box{position:relative;width:300px;margin:auto;}

.profile-img{
width:100%;
border-radius:50%;
border:5px solid #00f2fe;
box-shadow:0 0 30px rgba(0,255,255,0.7);
object-fit:cover;
}

/* ICON */
.icon{
position:absolute;
width:45px;height:45px;
background:white;color:black;
display:flex;align-items:center;justify-content:center;
border-radius:50%;
cursor:pointer;
animation:float 3s infinite alternate;
}
@keyframes float{from{transform:translateY(-10px);}to{transform:translateY(10px);}}

.left{right:-25px;top:40%;}
.right{left:-25px;top:40%;}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;padding:20px;
}
.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}
.gallery img:hover{transform:scale(1.08);}

@media(max-width:600px){
.gallery{grid-template-columns:repeat(2,1fr);}
}

/* VIEWER */
.viewer{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:black;
justify-content:center;
align-items:center;
}
.viewer img{max-width:90%;max-height:80%;}
.close{
position:absolute;
top:20px;right:30px;
font-size:30px;
cursor:pointer;
}

/* BUTTON */
.btn{
padding:12px 25px;
border:none;border-radius:30px;
background:linear-gradient(45deg,#00f2fe,#4facfe);
color:white;margin:10px;
cursor:pointer;
}

/* CONTACT */
.form-box{
max-width:400px;margin:auto;
background:#1e293b;
padding:20px;border-radius:15px;
}
input{
width:100%;
padding:12px;margin:10px 0;
border:none;border-radius:8px;
}

/* SOCIAL */
.social a{
display:inline-block;margin:10px;
padding:10px 15px;
background:#00f2fe;
border-radius:30px;
color:black;
text-decoration:none;
}
</style>
</head>

<body oncontextmenu="return false">

<nav>
<h2>Bhupesh</h2>
<ul>
<li onclick="scrollTo(0,0)">Home</li>
<li onclick="gallery.scrollIntoView()">Gallery</li>
<li onclick="contact.scrollIntoView()">Contact</li>
</ul>
</nav>

<section class="banner">
<h1>Welcome Bhupesh Website</h1>
<p>Fast • Secure • Professional</p>
</section>

<section>
<div class="profile-box">
<img src="img2.jpg" class="profile-img">
<div class="icon left" onclick="whatsapp()">💬</div>
<div class="icon right" onclick="call()">📞</div>
</div>
</section>

<section id="gallery">
<h2>Gallery</h2>
<div class="gallery">
<img src="1.jpg" onclick="openImg(this)">
<img src="2.jpg" onclick="openImg(this)">
<img src="3.jpg" onclick="openImg(this)">
<img src="4.jpg" onclick="openImg(this)">
<img src="5.jpg" onclick="openImg(this)">
</div>

<button class="btn" onclick="openAll()">All Photos</button>
<button class="btn" onclick="openAwards()">View Awards</button>
</section>

<section id="contact">
<h2>Contact</h2>
<div class="form-box">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<button class="btn" onclick="send()">Send</button>
</div>
</section>

<section>
<div class="social">
<a href="tel:9153631109">Call</a>
<a href="https://wa.me/9153631109">WhatsApp</a>
<a href="https://www.facebook.com/share/1BFTx9oihV/">Facebook</a>
<a href="https://www.instagram.com/bhupeshg71">Instagram</a>
</div>
<p>Email: kbhupesh060@gmail.com</p>
</section>

<div class="viewer" id="viewer">
<span class="close" onclick="closeImg()">✖</span>
<img id="big">
</div>

<script>
function openImg(e){
viewer.style.display="flex";
big.src=e.src;
}
function closeImg(){
viewer.style.display="none";
}

function openAll(){
let win=window.open("");
win.document.write(`
<body style="background:#0f172a;color:white;text-align:center;font-family:Poppins">
<h1>Bhupesh G Gallery</h1>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:20px">
${[...Array(95)].map((_,i)=>`<img src="${i+6}.jpg" onclick="openImg(this)" style="width:100%">`).join("")}
</div>
<script>
function openImg(e){document.body.innerHTML='<img src="'+e.src+'" style="width:100%">'}
<\/script>
</body>
`);
}

function openAwards(){
let win=window.open("");
win.document.write(`
<body style="background:#0f172a;color:white;text-align:center;font-family:Poppins">
<h1>Bhupesh Awards</h1>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:20px">
${[...Array(30)].map((_,i)=>`<img src="p${i+1}.jpg" onclick="openImg(this)" style="width:100%">`).join("")}
</div>
<script>
function openImg(e){document.body.innerHTML='<img src="'+e.src+'" style="width:100%">'}
<\/script>
</body>
`);
}

function send(){
let msg=`Name:${name.value}%0APhone:${phone.value}%0AEmail:${email.value}`;
window.open(`https://wa.me/9153631109?text=${msg}`);
}

function call(){location.href="tel:9153631109";}
function whatsapp(){window.open("https://wa.me/9153631109");}

document.onkeydown=function(e){
if(e.keyCode==123) return false;
};
</script>

</body>
</html>
